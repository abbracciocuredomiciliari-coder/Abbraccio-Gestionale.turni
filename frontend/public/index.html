<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="OPBGestionale - Gestione turni personale" />
    <title>OPBGestionale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            boxShadow: {
              'soft':   '0 2px 15px -3px rgba(0,150,214,0.10), 0 10px 20px -2px rgba(0,0,0,0.04)',
              'medium': '0 4px 25px -5px rgba(0,150,214,0.15), 0 10px 10px -5px rgba(0,0,0,0.04)',
              'large':  '0 10px 40px -10px rgba(0,150,214,0.20), 0 4px 25px -5px rgba(0,0,0,0.10)',
            },
            colors: {
              /* Azzurro OPBG */
              primary: {
                50: '#e6f5fb', 100:'#ccebf8', 200:'#99d6f1', 300:'#66c2ea',
                400:'#33ade3', 500:'#0096d6', 600:'#007ab0', 700:'#005d8a',
                800:'#004166', 900:'#002540'
              },
              secondary: {
                25:'#fafbfc',50:'#f4f7f9',100:'#e9eef3',200:'#d1dbe5',
                300:'#adbccc',400:'#7e99af',500:'#5a7a91',600:'#3e5f76',
                700:'#2c475a',800:'#1c2f3e',900:'#0e1a24'
              },
              success: {
                50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',
                400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',
                800:'#166534',900:'#14532d'
              },
              warning: {
                50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',
                400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',
                800:'#92400e',900:'#78350f'
              },
              error: {
                50:'#fef2f2',100:'#fee2e2',200:'#fecaca',300:'#fca5a5',
                400:'#f87171',500:'#ef4444',600:'#dc2626',700:'#b91c1c',
                800:'#991b1b',900:'#7f1d1d'
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Inter', sans-serif; }
      .loading-spinner {
        display: inline-block;
        width: 1.5rem; height: 1.5rem;
        border: 2px solid #e5e7eb;
        border-radius: 50%;
        border-top-color: #3b82f6;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .animate-fade-in { animation: fadeIn 0.3s ease-in; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      .animate-slide-down { animation: slideDown 0.25s ease-out; }
      @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <noscript>Abilita JavaScript per usare questa applicazione.</noscript>
    <div id="root"></div>
  </body>
</html>
